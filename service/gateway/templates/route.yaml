{{- range .Values.routes }}
---
{{- if eq .kind "TLSRoute" }}
apiVersion: gateway.networking.k8s.io/v1alpha2
{{- else }}
apiVersion: gateway.networking.k8s.io/v1
{{- end }}
kind: {{ .kind }}
metadata:
  name: {{ .name }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
  {{- if .hostnames }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ join "," .hostnames }}
  {{- end }}
spec:
  {{- if .hostnames }}
  hostnames:
    {{- range .hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- if .rules }}
  rules:
    {{- toYaml .rules | nindent 4 }}
  {{- end }}
  {{- if .gateways }}
  parentRefs:
    {{- range .gateways }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
