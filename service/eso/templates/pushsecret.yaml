{{- range $i, $secret := .Values.pushSercrets }}
{{- if not (empty $secret.data) }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-push-secret-{{ .name | default (printf "%s-external-secret-%d" $.Release.Name $i) }}
  labels:
    {{- include "eso.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
spec:
  template:
    spec:
      serviceAccountName: external-secrets-resource-creator
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for external-secrets CRDs to be available..."
              for i in {1..60}; do
                if kubectl get crd pushsecrets.external-secrets.io >/dev/null 2>&1; then
                  echo "CRD found, creating PushSecret"
                  cat <<EOF | kubectl apply -f -
              apiVersion: external-secrets.io/v1alpha1
              kind: PushSecret
              metadata:
                name: {{ $secret.name | default (printf "%s-push-secret-%d" $.Release.Name $i) }}
                namespace: {{ $.Release.Namespace }}
                labels:
                  {{- include "eso.labels" $ | nindent 18 }}
              spec:
                refreshInterval: {{ $secret.refreshInterval | default "1h0m0s" }}
                {{- with $secret.secretStoreRefs }}
                secretStoreRefs:
                  {{- range $j, $ref := . }}
                    - name: {{ $ref.name | default (printf "%s-secret-store-%d-%d" $.Release.Name $i $j) }}
                      kind: {{ $ref.kind | default "SecretStore" }}
                  {{- end }}
                {{- end }}
                selector:
                  secret:
                    name: {{ $secret.secretName }}
                {{- with $secret.data }}
                data:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
              EOF
                  exit 0
                fi
                echo "Waiting for CRD... attempt $i/60"
                sleep 5
              done
              echo "Timed out waiting for external-secrets CRD"
              exit 1
{{- end }}
{{- end }}
