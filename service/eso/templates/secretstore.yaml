{{- range $i, $store := .Values.secretStores }}
{{- if not (empty $store.provider) }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-secret-store-{{ .name | default (printf "%s-secret-store-%d" $.Release.Name $i) }}
  labels:
    {{- include "eso.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
spec:
  template:
    spec:
      serviceAccountName: external-secrets-resource-creator
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for external-secrets CRDs to be available..."
              for i in {1..60}; do
                {{- if (eq $store.kind "ClusterSecretStore") }}
                if kubectl get crd clustersecretstores.external-secrets.io >/dev/null 2>&1; then
                  echo "CRD found, creating ClusterSecretStore"
                {{- else }}
                if kubectl get crd secretstores.external-secrets.io >/dev/null 2>&1; then
                  echo "CRD found, creating SecretStore"
                {{- end }}
                  cat <<EOF | kubectl apply -f -
              apiVersion: external-secrets.io/v1
              kind: {{ $store.kind | default "SecretStore" }}
              metadata:
                name: {{ $store.name | default (printf "%s-secret-store-%d" $.Release.Name $i) }}
                {{- if not (eq $store.kind "ClusterSecretStore") }}
                namespace: {{ $.Release.Namespace }}
                {{- end }}
                labels:
                  {{- include "eso.labels" $ | nindent 18 }}
              spec:
                {{- with $store.provider }}
                provider:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
{{- end }}
{{- end }}
