{{- range $i, $secret := .Values.externalSecrets }}
{{- if not (empty $secret.externalSecretSpec) }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-external-secret-{{ .name | default (printf "%s-external-secret-%d" $.Release.Name $i) }}
  labels:
    {{- include "eso.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
spec:
  template:
    spec:
      serviceAccountName: external-secrets-resource-creator
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for external-secrets CRDs to be available..."
              for i in {1..60}; do
                {{- if (eq $secret.kind "ClusterExternalSecret") }}
                if kubectl get crd clusterexternalsecrets.external-secrets.io >/dev/null 2>&1; then
                  echo "CRD found, creating ClusterExternalSecret"
                {{- else }}
                if kubectl get crd externalsecrets.external-secrets.io >/dev/null 2>&1; then
                  echo "CRD found, creating ExternalSecret"
                {{- end }}
                  cat <<EOF | kubectl apply -f -
              apiVersion: external-secrets.io/v1
              kind: {{ $secret.kind | default "ExternalSecret" }}
              metadata:
                name: {{ $secret.name | default (printf "%s-external-secret-%d" $.Release.Name $i) }}
                {{- if not (eq $secret.kind "ClusterExternalSecret") }}
                namespace: {{ $secret.namespace | default $.Release.Namespace }}
                {{- end }}
                labels:
                  {{- include "eso.labels" $ | nindent 18 }}
              spec:
                {{- if (eq $secret.kind "ClusterExternalSecret") }}
                externalSecretName: {{ $secret.name | default (printf "%s-external-secret-%d" $.Release.Name $i) }}
                {{- if $secret.matchLabels }}
                namespaceSelectors:
                  - matchLabels:
                      {{- range $key, $val := $secret.matchLabels }}
                      {{ $key }}: {{ $val }}
                      {{- end }}
                {{- end }}
                refreshTime: {{ $secret.refreshTime | default "1m" }}
                {{- with $secret.externalSecretSpec }}
                externalSecretSpec:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
                {{- else }}
                refreshInterval: {{ $secret.refreshInterval | default "1m" }}
                {{- with $secret.externalSecretSpec }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
                {{- end }}
              EOF
                  exit 0
                fi
                echo "Waiting for CRD... attempt $i/60"
                sleep 5
              done
              echo "Timed out waiting for external-secrets CRD"
              exit 1
{{- end }}
{{- end }}
