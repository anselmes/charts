---

# MARK: OpenEBS

# Configuration for OpenEBS - Open Source Container Attached Storage
# OpenEBS provides dynamic local and replicated storage options for Kubernetes
openebs:
  # Enable OpenEBS storage solutions deployment
  # When enabled, deploys OpenEBS operators and storage engines
  enabled: true
  # OpenEBS Custom Resource Definitions (CRDs) configuration
  # These CRDs define the storage resources and behaviors
  openebs-crds:
    csi:
      # CSI Volume Snapshots feature configuration
      # Enables point-in-time snapshots of persistent volumes
      volumeSnapshots:
        enabled: false
        # Retain CRDs during chart uninstallation
        # true: CRDs persist after uninstall, false: CRDs are removed
        keep: false
  # ZFS LocalPV storage engine configuration
  # Provides high-performance local storage using ZFS datasets
  zfs-localpv:
    crds:
      zfsLocalPv:
        # Enable ZFS LocalPV Custom Resource Definitions
        # Required for ZFS-based local persistent volume provisioning
        enabled: true
      csi:
        volumeSnapshots:
          # Enable volume snapshots for ZFS LocalPV
          # Allows creation of point-in-time snapshots of ZFS volumes
          enabled: true
          className: openebs-zfspv
          deletionPolicy: Delete
    class:
      poolName: ""
      defaultClass: filesystem
      # volumeBindingMode: WaitForFirstConsumer
      filesystem:
        enabled: true
        name: openebs-zfspv
      block:
        enabled: true
        name: openebs-zfspv-block
      # topology:
      #   - matchLabelExpressions:
      #     - key: kubernetes.io/hostname
      #       values:
      #         - zfspv-node1
      #         - zfspv-node2
  # LVM LocalPV storage engine configuration
  # Provides local storage using Logical Volume Manager (LVM)
  lvm-localpv:
    crds:
      lvmLocalPv:
        # Enable LVM LocalPV Custom Resource Definitions
        # Required for LVM-based local persistent volume provisioning
        enabled: true
      csi:
        volumeSnapshots:
          # Enable volume snapshots for LVM LocalPV
          # Allows creation of thin-provisioned LVM snapshots
          enabled: true
          className: openebs-lvmpv
          deletionPolicy: Delete
    class:
      volgroup: ""
      defaultClass: filesystem
      # volumeBindingMode: WaitForFirstConsumer
      filesystem:
        enabled: true
        name: openebs-lvmpv
      block:
        enabled: true
        name: openebs-lvmpv-block
      # topology:
      #   - matchLabelExpressions:
      #     - key: kubernetes.io/hostname
      #       values:
      #         - zfspv-node1
      #         - zfspv-node2
  # Storage engines configuration
  # Defines which storage backends are enabled for different use cases
  engines:
    local:
      lvm:
        # Enable LVM-based local storage engine
        # Provides block storage using Linux Logical Volume Manager
        enabled: false
      zfs:
        # Enable ZFS-based local storage engine
        # Provides advanced features like compression, deduplication, and snapshots
        enabled: false
    replicated:
      mayastor:
        # Enable Mayastor replicated storage engine
        # High-performance NVMe-over-TCP based replicated storage
        enabled: false
  # LocalPV Provisioner configuration
  # Handles dynamic provisioning of local persistent volumes
  localpv-provisioner:
    analytics:
      # Enable usage analytics collection
      # Helps OpenEBS community understand usage patterns (anonymized)
      enabled: false
    hostpathClass:
      # HostPath storage class configuration
      # Uses host filesystem directories for storage (suitable for single-node)
      enabled: true
      # Storage class name for HostPath volumes
      name: openebs-hostpath
      # Set as default storage class
      # When true, this storage class is used by default for new PVCs
      isDefaultClass: true
    localpv:
      # Enable LocalPV dynamic provisioning
      # Allows automatic creation of local persistent volumes
      enabled: true
  loki:
    enabled: false
  alloy:
    enabled: false

# MARK: AWS EBS

# AWS EBS CSI Driver configuration
# Provides persistent storage using Amazon Elastic Block Store (EBS) volumes
ebs:
  # Enable AWS EBS CSI driver deployment
  # Allows Kubernetes to use AWS EBS volumes for persistent storage
  enabled: false
  # Enable FIPS 140-2 cryptographic compliance
  # Required for government and regulated environments
  fips: false
  # AWS credentials configuration
  # Required for EBS API authentication and authorization
  awsAccessSecret:
    # Secret name containing AWS credentials
    name: aws-secret
    # AWS Access Key ID field name in secret
    keyId: key_id
    # AWS Secret Access Key field name in secret
    accessKey: access_key
  controller:
    # Default filesystem type for EBS volumes
    # Used when no fsType is specified in storage class
    defaultFsType: ext4
    # AWS region for EBS operations
    # Must match the region where Kubernetes cluster is deployed
    region: us-east-1
  # Custom storage classes for different EBS volume types
  # Define multiple storage classes with specific EBS configurations
  storageClasses: []
  # Example storage class configuration:
  # - name: ebs-sc
  #   # Storage class annotations
  #   annotations:
  #     storageclass.kubernetes.io/is-default-class: "true"
  #   # Storage class labels
  #   labels:
  #     my-label-is: supercool
  #   # Volume binding mode (WaitForFirstConsumer recommended for topology awareness)
  #   volumeBindingMode: WaitForFirstConsumer
  #   # Reclaim policy for volumes (Delete or Retain)
  #   reclaimPolicy: Retain
  #   # EBS-specific parameters
  #   parameters:
  #     encrypted: "true"
  defaultStorageClass:
    # Enable default EBS storage class creation
    # Creates a general-purpose storage class for EBS volumes
    enabled: false

# MARK: Openstack Cinder

# OpenStack Cinder CSI Driver configuration
# Provides block storage integration with OpenStack Cinder volumes
cinder:
  # Enable Cinder CSI driver deployment
  # Allows Kubernetes to use OpenStack Cinder for persistent storage
  enabled: false
  secret:
    # Enable OpenStack credentials secret
    # Required for authentication with OpenStack cloud services
    enabled: true
    # Mount secret as host volume
    # Alternative to environment variable injection for credentials
    hostMount: false
    # Secret name containing OpenStack configuration
    # Must include cloud.conf with OpenStack authentication details
    name: cinder-csi-cloud-config
  storageClass:
    # Create Cinder storage classes
    # Defines how Kubernetes provisions Cinder volumes with different policies
    enabled: true
    delete:
      # Storage class with Delete reclaim policy
      # Volumes are deleted when PVCs are removed
      isDefault: false
      # Allow online volume expansion
      # Enables resizing of volumes without pod restart
      allowVolumeExpansion: true
    retain:
      # Storage class with Retain reclaim policy
      # Volumes persist after PVCs are deleted (manual cleanup required)
      isDefault: false
      # Allow online volume expansion
      # Enables resizing of volumes without pod restart
      allowVolumeExpansion: true

# MARK: Rook Operator

# Rook Ceph Operator configuration
# Rook orchestrates Ceph storage cluster in Kubernetes environments
rook:
  # Enable Rook Ceph operator deployment
  # Manages Ceph clusters as Kubernetes native applications
  enabled: false
  # Allow loop devices for storage (testing only)
  # WARNING: Only enable for development/testing environments
  allowLoopDevices: false
  csi:
    # Enable RBD (RADOS Block Device) CSI driver
    # Provides block storage volumes backed by Ceph RBD images
    enableRbdDriver: true
    # Enable CephFS CSI driver
    # Provides shared filesystem volumes backed by Ceph filesystem
    enableCephfsDriver: true
    # Enable CSI volume encryption
    # Encrypts data at rest using dm-crypt
    enableCSIEncryption: false
  crds:
    # Deploy Rook Ceph Custom Resource Definitions
    # Required for Rook to manage Ceph cluster resources
    enabled: true

# MARK: Rook Ceph

# Rook Ceph Cluster configuration
# Defines the actual Ceph storage cluster managed by Rook operator
ceph:
  # Enable Ceph cluster deployment
  # Creates a production-ready Ceph cluster with specified configuration
  enabled: false
  # Rook operator namespace
  # Must match the namespace where Rook operator is deployed
  operatorNamespace: rook-ceph
  toolbox:
    # Enable Ceph toolbox deployment
    # Provides debugging tools and cluster management capabilities
    enabled: false
  cephClusterSpec:
    mon:
      # Number of monitor pods to deploy
      count: 3
      # Allow or disallow multiple monitors per node
      allowMultiplePerNode: false
    mgr:
      # Number of manager pods to deploy
      count: 2
      # Allow or disallow multiple managers per node
      allowMultiplePerNode: false
    dashboard:
      # Enable or disable the Ceph dashboard
      enabled: true
      # Enable or disable SSL for the dashboard
      ssl: true
    storage:
      # Use all nodes for storage
      useAllNodes: true
      # Use all devices for storage
      useAllDevices: true
  cephBlockPools:
    - name: ceph-blockpool
      spec:
        # Failure domain for the block pool
        failureDomain: host
        replicated:
          # Replication size for the block pool
          size: 3
      storageClass:
        # Enable or disable the storage class for the block pool
        enabled: true
        # Name of the storage class
        name: ceph-block
        # Set the storage class as the default
        isDefault: true
  cephFileSystems:
    - name: ceph-filesystem
      spec:
        metadataPool:
          replicated:
            # Replication size for the metadata pool
            size: 3
        dataPools:
          - failureDomain: host
            name: data0
            replicated:
              # Replication size for the data pool
              size: 3
        metadataServer:
          # Number of active metadata servers
          activeCount: 1
          # Enable or disable active-standby mode for metadata servers
          activeStandby: true
      storageClass:
        # Enable or disable the storage class for the filesystem
        enabled: true
        # Set the storage class as the default
        isDefault: false
        # Name of the storage class
        name: ceph-filesystem
        # Name of the data pool
        pool: data0
  cephObjectStores:
    - name: ceph-objectstore
      spec:
        # Preserve pools on deletion
        preservePoolsOnDelete: true
        metadataPool:
          failureDomain: host
          replicated:
            # Replication size for the metadata pool
            size: 3
        dataPool:
          failureDomain: host
          erasureCoded:
            # Number of data chunks for erasure coding
            dataChunks: 2
            # Number of coding chunks for erasure coding
            codingChunks: 1
        gateway:
          # Port for the object store gateway
          port: 80
      storageClass:
        # Enable or disable the storage class for the object store
        enabled: true
        # Name of the storage class
        name: ceph-bucket
        parameters:
          # Region for the object store
          region: us-east-1
  cephBlockPoolsVolumeSnapshotClass:
    # Enable or disable the volume snapshot class for block pools.
    # Set to true to allow snapshots for Ceph block pools.
    enabled: false
    # Name of the volume snapshot class for Ceph block pools.
    # This name will be used to reference the snapshot class in Kubernetes.
    name: ceph-block
    # Set the snapshot class as the default for block pools.
    # If true, this snapshot class will be used by default for block pool snapshots.
    isDefault: false
  cephFileSystemVolumeSnapshotClass:
    # Enable or disable the volume snapshot class for Ceph filesystems.
    # Set to true to allow snapshots for Ceph filesystems.
    enabled: false
    # Name of the volume snapshot class for Ceph filesystems.
    # This name will be used to reference the snapshot class in Kubernetes.
    name: ceph-filesystem
    # Set the snapshot class as the default for filesystems.
    # If true, this snapshot class will be used by default for filesystem snapshots.
    isDefault: true

# MARK: vSphere

# VMware vSphere CSI Driver configuration
# Provides persistent storage integration with vSphere infrastructure
vsphere:
  # Enable vSphere CSI driver deployment
  # Allows Kubernetes to use vSphere datastores for persistent volumes
  enabled: false
  vcenterConfig:
    # Enable vCenter configuration
    # Required for authentication and communication with vCenter server
    enabled: false
    # Secret containing vCenter credentials and configuration
    # Must include vcenter server details and authentication information
    secretName: vcenter-config-secret
    # Unique cluster identifier in vSphere environment
    # Used to identify this Kubernetes cluster in vCenter
    clusterID: null
    # vCenter server certificate thumbprint
    # SHA-1 fingerprint for certificate validation (required for secure connections)
    thumbprint: null
    # vCenter server address
    # FQDN or IP address of the vCenter server
    vcenter: null
    # Allow insecure connections to vCenter
    # WARNING: Only use "true" for testing environments with self-signed certificates
    insecure: "true"
    # vCenter authentication username
    # User must have required permissions for datastore and VM operations
    user: null
    # vCenter authentication password
    # Corresponding password for the specified user
    password: null
    # vCenter server port
    # Default HTTPS port for vCenter API communication
    port: 443
    # List of vSphere datacenters
    # Datacenters where the CSI driver can provision storage
    datacenters: null
  defaultStorageClass:
    # Default storage class name
    # Used for automatic volume provisioning when no storage class is specified
    name: vsphere-csi
    # Enable default storage class creation
    # Creates a storage class for vSphere volumes with standard configuration
    enabled: true
    # Allow online volume expansion
    # Enables resizing of persistent volumes without downtime
    allowVolumeExpansion: true

# MARK: AIStore Operator

# AIStor Operator
# Manages AIStor object storage clusters in Kubernetes environments
aistorop:
  # Enable AIStor operator deployment
  # Manages AIStor object storage clusters in Kubernetes environments
  enabled: false
  # The MinIO license can be set directly from the Helm chart. Note that it is not advised
  # to expose the license key in the Helm chart. Instead, it is recommended to create a
  # secret manually. It's just here for convenience.
  license: ""
  # global settings are settings that will be applied to all operators
  # unless explicitly overridden in the operator settings.
  global:
    # The following settings will be set for all operators. They can
    # be overridden per operator by setting the same key in the
    # .operator.<operator> section.
    operator:
      # Specify number of replicas
      replicas: 1
  # All operators will be disabled by default, with the exception of
  # the object-store.
  operators:
    adminjob:
      disabled: false
    aihub:
      disabled: true
    object-store:
      disabled: false
    prompt:
      disabled: true
    warp:
      disabled: true

# MARK: AIStore Objectstore

# AIStor Object Store configuration
# Defines the AIStor object storage cluster managed by the AIStor operator
aistor:
  # Enable AIStor Object Store deployment
  # Deploys an AIStor object storage cluster managed by the AIStor operator
  enabled: false
  # Root key for dynamically creating a secret for use with configuring root MinIO User
  secrets:
    name: minio-env-configuration
    accessKey: null
    secretKey: null
    disableRoot: false
    existingSecret: true
  # Root key for AIStor Object Store
  objectStore:
    # The Object Store name
    name: minio
    existingSecret: true
    # The mount path where Persistent Volumes are mounted inside Object Store container(s).
    mountPath: /export
    # The Sub path inside Mount path where MinIO stores data.
    subPath: /data
    # Configures a Prometheus-compatible scraping endpoint at the specified port.
    # When PVC protection is set to true, the operator will prevent PVCs from being deleted by adding
    # finalizers to the PVCs. It is recommended to enable this for production use to prevent accidental
    # data loss when deleting a namespace.
    pvcProtection: true
    # Directs the Object Store Operator to add the Object Store's metric scrape configuration to an existing Kubernetes Prometheus deployment managed by the Prometheus Operator.
    prometheusOperator: false
    configuration:
      name: minio-env-configuration
    pools:
      # The number of MinIO Object Store Pods / Servers in this pool.
      # For standalone mode, supply 1. For distributed mode, supply 4 or more.
      # Note that the operator does not support upgrading from standalone to distributed mode.
      - name: pool-0
        servers: 4
        # The number of volumes attached per MinIO Pod / Server.
        volumesPerServer: 4
        # The capacity per volume requested per MinIO Pod.
        size: 10Gi
        # The `storageClass <https://kubernetes.io/docs/concepts/storage/storage-classes/>`__ to associate with volumes generated for this pool.
        # storageClassName: standard
        # These settings determine the distribution of pods across worker nodes.
        tolerations: []
        # If no worker nodes match the specified selectors, the deployment will fail.
        nodeSelector: {}
        # These settings determine the distribution of pods across worker nodes and can help prevent or allow colocating pods onto the same worker nodes.
        affinity: {}
        # We recommend disabling recursive permission changes by setting ``fsGroupChangePolicy`` to ``OnRootMismatch`` as those operations can be expensive for certain workloads (e.g. large volumes with many small files).
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
          runAsNonRoot: true
        # You may need to modify these values to meet your cluster's security and access settings.
        containerSecurityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        # These settings determine the distribution of pods across worker nodes.
        topologySpreadConstraints: []
        # SpreadZoneConfig enables multi-rack deployment for high availability across zones.
        # When enabled, the operator ensures MinIO pods are distributed across different zones/racks
        # to prevent data loss from zone failures.
        # This feature uses pod affinity rules to place each pod in a different zone,
        # ensuring data redundancy across physical infrastructure boundaries.
        # Example configuration:
        # spreadZoneConfig:
        #   enabled: true
        #   matchLabel: topology.kubernetes.io/zone  # The node label to use for zone identification
        #   matchValues:                              # List of zone values to spread pods across
        #     - zone-1
        #     - zone-2
        #     - zone-3
        #     - zone-4
        # For rack-based deployments:
        # spreadZoneConfig:
        #   enabled: true
        #   matchLabel: rack  # Custom label for rack identification
        #   matchValues:
        #     - rack-1
        #     - rack-2
        #     - rack-3
        #     - rack-4
    metrics:
      enabled: false
      port: 9000
      protocol: http
    # Enable SFTP service for the Object Store (default is false)
    # sftp:
    #   enabled: true
    #   serviceExternalTrafficPolicy: Cluster
    #   serviceType: ClusterIP
    #   nodePort: 31002
    #   domainName: ""
    # Directs the Object Store Operator to expose the S3 API or Web Console services to clients outside of the Kubernetes cluster.
    # Supports `LoadBalancer`, `NodePort`, and `ClusterIP` (Default)
    # These configurations do not prevent exposing the services via Ingress, Routes, or other networking features
    services:
      console:
        #name: myminio-console
        serviceType: ClusterIP
        #serviceType: NodePort
        #nodePort: 31000
        #serviceExternalTrafficPolicy: Local
        #annotations: {}
        #labels: {}
      minio:
        #name: myminio
        serviceType: ClusterIP
        #serviceType: NodePort
        #nodePort: 31001
        #serviceExternalTrafficPolicy: Local
        #annotations: {}
        #labels: {}
    certificates:
      # This is used by MinIO to verify TLS connections from clients using those CAs
      trustedCAs: []
        # - name: ""
        #   type: kubernetes.io/tls
        # - name: ""
        #   type: cert-manager.io/v1
      # Specify an array of Kubernetes secrets, where each entry corresponds to a secret contains the TLS private key and public certificate pair.
      server: []
        # - name: ""
        #   type: kubernetes.io/tls
      # Use this field to provide client certificates for MinIO & KES. This can be used to configure
      # mTLS for MinIO and your KES server. Files will be mounted under /tmp/certs folder, supported types:
      # Opaque | kubernetes.io/tls | cert-manager.io/v1alpha2 | cert-manager.io/v1
      # KESClient: {}
      # Use this field to provide additional client certificate for the MinIO Object Store
      # Certificate secret files will be mounted under /tmp/certs folder, supported types:
      # Opaque | kubernetes.io/tls | cert-manager.io/v1alpha2 | cert-manager.io/v1
      client: []
        # - name: ""
        #   type: kubernetes.io/tls
      # Enable automatic Kubernetes based `certificate generation and signing <https://kubernetes.io/docs/tasks/tls/managing-tls-in-a-cluster>`__
      disableAutoCert: false
      # The minimum number of days to expiry before an alert for an expiring certificate is fired.
      # In the below example, if a given certificate will expire in 7 days then expiration events will only be triggered 1 day before expiry
      # certExpiryAlertThreshold: 1
    # kes:
    #   replicas: 1
    #   serviceAccountName: ""
    #   keyName: minio-key
    #   securityContext:
    #     runAsUser: 1000
    #     runAsGroup: 1000
    #     runAsNonRoot: true
    #     fsGroup: 1000
    #   containerSecurityContext:
    #     runAsUser: 1000
    #     runAsGroup: 1000
    #     runAsNonRoot: true
    #     allowPrivilegeEscalation: false
    #     capabilities:
    #       drop:
    #         - ALL
    #     seccompProfile:
    #       type: RuntimeDefault
    #   configuration: |-
    #     address: :7373
    #     tls:
    #       key: /tmp/kes/server.key   # Path to the TLS private key
    #       cert: /tmp/kes/server.crt  # Path to the TLS certificate
    #       proxy:
    #         identities: []
    #         header:
    #           cert: X-Tls-Client-Cert
    #     admin:
    #       identity: ${MINIO_KES_IDENTITY}
    #     cache:
    #       expiry:
    #         any: 5m0s
    #         unused: 20s
    #     log:
    #       error: on
    #       audit: off
    #     keystore:
    #       #  KES configured with fs (File System mode) doesn't work in Kubernetes environments and is not recommended
    #       #  use a real KMS
    #       fs:
    #         path: /tmp/kes/keys   # Path to directory. Keys will be stored as files. Not Recommended for Production.
    #       # vault:
    #       #   endpoint: http://vault.default.svc.cluster.local:8200   # The Vault endpoint
    #       #   namespace: ""       # An optional Vault namespace. See: https://www.vaultproject.io/docs/enterprise/namespaces/index.html
    #       #   prefix: minio       # An optional K/V prefix. The server will store keys under this prefix.
    #       #   approle:            # AppRole credentials. See: https://www.vaultproject.io/docs/auth/approle.html
    #       #     id: ""            # Your AppRole Role ID
    #       #     secret: ""        # Your AppRole Secret ID
    #       #     retry: 15s        # Duration until the server tries to re-authenticate after connection loss.
    #       #   tls:                # The Vault client TLS configuration for mTLS authentication and certificate verification
    #       #     key: ""           # Path to the TLS client private key for mTLS authentication to Vault
    #       #     cert: ""          # Path to the TLS client certificate for mTLS authentication to Vault
    #       #     ca: ""            # Path to one or multiple PEM root CA certificates
    #       #   status:             # Vault status configuration. The server will periodically reach out to Vault to check its status.
    #       #     ping: 10s         # Duration until the server checks Vault's status again.
    #       # aws:
    #       #   # The AWS SecretsManager key store. The server will store
    #       #   # secret keys at the AWS SecretsManager encrypted with
    #       #   # AWS-KMS. See: https://aws.amazon.com/secrets-manager
    #       #   secretsmanager:
    #       #     endpoint: ""      # The AWS SecretsManager endpoint      - e.g.: secretsmanager.us-east-2.amazonaws.com
    #       #     region: ""        # The AWS region of the SecretsManager - e.g.: us-east-2
    #       #     kmskey: ""        # The AWS-KMS key ID used to en/decrypt secrets at the SecretsManager. By default (if not set) the default AWS-KMS key will be used.
    #       #     credentials:      # The AWS credentials for accessing secrets at the AWS SecretsManager.
    #       #       accesskey: ""   # Your AWS Access Key
    #       #       secretkey: ""   # Your AWS Secret Key
    #       #       token: ""       # Your AWS session token (usually optional)
