{{- if and .Values.openebs.mayastor.crds.csi.volumeSnapshots.enabled .Values.openebs.engines.replicated.mayastor.enabled }}
---
kind: VolumeSnapshotClass
apiVersion: snapshot.storage.k8s.io/v1
metadata:
  name: {{ .Values.openebs.mayastor.crds.csi.volumeSnapshots.className }}
  annotations:
    snapshot.storage.kubernetes.io/is-default-class: "true"
driver: io.openebs.csi-mayastor
deletionPolicy: {{ .Values.openebs.mayastor.crds.csi.volumeSnapshots.deletionPolicy }}
{{- end }}
