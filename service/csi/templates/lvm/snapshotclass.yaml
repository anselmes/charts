{{- if and (index .Values.openebs "lvm-localpv").crds.csi.volumeSnapshots.enabled .Values.openebs.engines.local.lvm.enabled }}
---
kind: VolumeSnapshotClass
apiVersion: snapshot.storage.k8s.io/v1
metadata:
  name: {{ (index .Values.openebs "lvm-localpv").crds.csi.volumeSnapshots.className }}
  annotations:
    snapshot.storage.kubernetes.io/is-default-class: "true"
driver: local.csi.openebs.io
deletionPolicy: {{ (index .Values.openebs "lvm-localpv").crds.csi.volumeSnapshots.deletionPolicy }}
{{- end }}
