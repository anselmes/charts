# MARK: Headscale Operator

operator:
  enabled: false

  # Operator configuration
  replicaCount: 1

  image:
    repository: ghcr.io/infradohq/headscale-operator
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion
    tag: ""

  imagePullSecrets: []

  # Resources for the operator
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  # Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20

  # Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Affinity rules
  affinity: {}

ca:
  enabled: false

  # MARK: - Issuers

  issuers:
    - name: ca-issuer-headscale
      selfSigned: true
      secret:
        create: false

gateway:
  enabled: false

  # MARK: Routes

  routes:
    - name: headscale-http
      kind: HTTPRoute
      hostnames:
        - vpn.headscale.local
      rules:
        - backendRefs:
            - name: headscale
              port: 80
        # - filters:
        #     - type: RequestRedirect
        #       requestRedirect:
        #         scheme: https
        #         statusCode: 301
      gateways:
        - name: http-gateway-headscale

  # MARK: Gateways

  gateways: []
