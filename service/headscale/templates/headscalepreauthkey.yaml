{{- range .Values.headscale.authKeys }}
{{- if .enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-headscalepreauthkey-{{ .keyName | default (printf "%s-auth-key" $.Release.Name) }}
  labels:
    {{- include "headscale.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
spec:
  template:
    spec:
      serviceAccountName: headscale-resource-creator
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for headscale CRDs to be available..."
              for i in {1..60}; do
                if kubectl get crd headscalepreauthkeys.headscale.infrado.cloud >/dev/null 2>&1; then
                  echo "CRD found, creating HeadscalePreAuthKey"
                  cat <<EOF | kubectl apply -f -
              apiVersion: headscale.infrado.cloud/v1beta1
              kind: HeadscalePreAuthKey
              metadata:
                name: {{ .keyName | default (printf "%s-auth-key" $.Release.Name) }}
                namespace: {{ $.Release.Namespace }}
              spec:
                headscaleRef: {{ .headscaleRef | default $.Release.Name }}
                headscaleUserRef: {{ .headscaleUserRef }}
                {{- if .userId }}
                userId: {{ .userId }}
                {{- end }}
                expiration: {{ .expiration | default "24h" }}
                reusable: {{ .reusable | default false }}
                ephemeral: {{ .ephemeral | default false }}
                {{- if and .tags (not (empty .tags)) }}
                tags:
                {{- range .tags }}
                  - {{ . }}
                {{- end }}
                {{- end }}
                {{- if .secretName }}
                secretName: {{ .secretName }}
                {{- end }}
              EOF
                  exit 0
                fi
                echo "Attempt $i: headscalepreauthkey CRD not ready, waiting 10s..."
                sleep 10
              done
              echo "Timeout waiting for headscalepreauthkey CRD"
              exit 1
{{- end }}
{{- end }}
