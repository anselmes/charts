{{- if .Values.cilium.l2Announcement.enabled }}
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: {{ include "cni-resources.fullname" . }}-l2-policy
  labels:
    {{- include "cni-resources.labels" . | nindent 4 }}
spec:
  externalIPs: {{ .Values.cilium.l2Announcement.externalIPs }}
  loadBalancerIPs: {{ .Values.cilium.l2Announcement.loadBalancerIPs }}
{{- end }}
