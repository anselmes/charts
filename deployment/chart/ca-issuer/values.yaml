---
conf:
  ca:
    issuer:
      name: ca-issuer
    secret:
      name: secret-name
      crt: null
      key: null
  vault:
    path: pki_int/sign/application-1
    server: https://vault.vault:8200
    auth:
      kubernetes:
        role: vault-issuer
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: vault-issuer
    secretRefs:
      caBundleSecretRef:
        key: server_ca.crt
        name: vault-client-tls
      clientCertSecretRef:
        name: vault-client-tls
        key: client.crt
      clientKeySecretRef:
        name: vault-client-tls
        key: client.key

# Default Version of jetstack/cert-manager being deployed.
# Starting at v1.0.0, api-version: cert-manager.io/v1 is used
# For previous apiVersion: cert-manager.io/v1alpha3, change to older version (such as v0.15.0)
cert_manager_version: v1.0.0

manifests:
  issuer: true
  secret_ca: true
  self_signed_ca: false
  vault_ca: false
