# Add 'repo' label to any root file changes
repo:
  - "*"

# Add 'github-actions' label to any changes in the '.github' directory
github-actions:
  - .github/workflows/*
  - .github/workflows/*/**
  - .github/dependabot.yml
  - .github/dependabot.yml/**

# Add 'devcontainer' label to any changes in the '.devcontainer' directory
# and the '.docker' directory
devcontainer:
  - .devcontainer/*
  - .devcontainer/**/*
  - .docker/*
  - .docker/**/*

# Add 'helm' label to helm chart
helm:
  - deployment/chart/*
  - deployment/chart/**

# Add 'docs' label to any changes in the 'docs' directory
# and '*.md' files
docs:
  - docs/*
  - docs/*/**
  - '*.md'

# Add 'tools' label to any changes in the 'tools' directory
tools:
  - tools/*
  - tools/*/**
